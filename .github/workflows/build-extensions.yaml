name: Build Extensions

# Builds kernel + GPU driver extensions and pushes to ghcr.io.
# Run this ONCE after updating Talos, kernel, or nvgpu versions.
# Subsequent usb-build runs auto-skip if extension images are already cached in ghcr.io.
#
# Runtime: ~90 min (cold cache), ~5 min (cache hit).
# After this completes, trigger "Build USB Image" to produce the .raw file.
#
# Uses ubuntu-24.04-arm (standard ARM64 runner — free for public repos).
# To force a rebuild when images are already cached: delete the existing
# ghcr.io image tags manually, then re-trigger this workflow.

on:
  workflow_dispatch:
  workflow_call:   # allow release.yaml to call this as a reusable workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extensions:
    name: Build extensions
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if extension images already exist
        id: check_cache
        run: |
          source scripts/common.sh
          NVGPU_IMAGE="ghcr.io/${{ github.repository_owner }}/nvidia-tegra-nvgpu:${NVGPU_VERSION}-${KERNEL_VERSION}-talos"
          KM_IMAGE="ghcr.io/${{ github.repository_owner }}/kernel-modules-clang:${KERNEL_MODULES_VERSION}-${KERNEL_VERSION}-talos"
          INSTALLER_IMAGE="ghcr.io/${{ github.repository_owner }}/custom-installer:${TALOS_VERSION}-${KERNEL_VERSION}"
          FW_IMAGE="ghcr.io/${{ github.repository_owner }}/nvidia-firmware-ext:${FIRMWARE_EXT_TAG}"
          NVGPU_EXISTS=false
          KM_EXISTS=false
          INSTALLER_EXISTS=false
          FW_EXISTS=false
          docker manifest inspect "${NVGPU_IMAGE}"     >/dev/null 2>&1 && NVGPU_EXISTS=true     || true
          docker manifest inspect "${KM_IMAGE}"        >/dev/null 2>&1 && KM_EXISTS=true        || true
          docker manifest inspect "${INSTALLER_IMAGE}" >/dev/null 2>&1 && INSTALLER_EXISTS=true || true
          docker manifest inspect "${FW_IMAGE}"        >/dev/null 2>&1 && FW_EXISTS=true        || true
          # All three must exist — custom-installer is built together with extensions and is
          # required by the build-usb job. Skipping the build when installer is missing would
          # cause the downstream UKI assembly to fail with a pull error.
          if ${NVGPU_EXISTS} && ${KM_EXISTS} && ${INSTALLER_EXISTS}; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✓ kernel+nvgpu+installer images already in ghcr.io — skipping bldr build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            ${NVGPU_EXISTS}     || echo "Will build: ${NVGPU_IMAGE}"
            ${KM_EXISTS}        || echo "Will build: ${KM_IMAGE}"
            ${INSTALLER_EXISTS} || echo "Will build: ${INSTALLER_IMAGE}"
          fi
          # firmware is independent — track separately
          if ${FW_EXISTS}; then
            echo "skip_fw=true" >> "$GITHUB_OUTPUT"
            echo "✓ nvidia-firmware-ext:${FIRMWARE_EXT_TAG} already in ghcr.io — skipping firmware build"
          else
            echo "skip_fw=false" >> "$GITHUB_OUTPUT"
            echo "Will build: ${FW_IMAGE}"
          fi

      - name: Set up Docker Buildx (named talos-builder for script compatibility)
        if: steps.check_cache.outputs.skip != 'true'
        run: |
          docker buildx create --name talos-builder --driver docker-container --use
          docker buildx inspect talos-builder --bootstrap

      - name: Restore signing keys
        if: steps.check_cache.outputs.skip != 'true'
        env:
          SIGNING_KEY_PEM: ${{ secrets.SIGNING_KEY_PEM }}
          SIGNING_KEY_X509: ${{ secrets.SIGNING_KEY_X509 }}
        run: |
          mkdir -p keys
          printf '%s' "${SIGNING_KEY_PEM}"  > keys/signing_key.pem
          printf '%s' "${SIGNING_KEY_X509}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem
          openssl x509 -in keys/signing_key.x509 -noout -serial

      - name: Clone siderolabs/pkgs at pinned commit
        if: steps.check_cache.outputs.skip != 'true'
        run: |
          source scripts/common.sh
          echo "Cloning siderolabs/pkgs @ ${PKGS_COMMIT} (branch ${PKGS_BRANCH})..."
          git clone --filter=blob:none --single-branch --branch "${PKGS_BRANCH}" \
            https://github.com/siderolabs/pkgs /tmp/talos-pkgs
          cd /tmp/talos-pkgs && git checkout "${PKGS_COMMIT}"
          echo "✓ talos-pkgs ready at $(git -C /tmp/talos-pkgs rev-parse --short HEAD)"

          # Inject our custom packages into the pkgs tree
          mkdir -p /tmp/talos-pkgs/nvidia-tegra-nvgpu
          cp "${GITHUB_WORKSPACE}/nvidia-tegra-nvgpu/pkg.yaml" \
             /tmp/talos-pkgs/nvidia-tegra-nvgpu/pkg.yaml
          echo "✓ nvidia-tegra-nvgpu/pkg.yaml injected"

          mkdir -p /tmp/talos-pkgs/kernel-modules-clang
          cp "${GITHUB_WORKSPACE}/kernel-modules-clang/pkg.yaml" \
             /tmp/talos-pkgs/kernel-modules-clang/pkg.yaml
          echo "✓ kernel-modules-clang/pkg.yaml injected"

          # Patch Pkgfile: inject custom LLVM vars needed by nvidia-tegra-nvgpu/pkg.yaml
          # (the official siderolabs/pkgs Pkgfile does not define LLVM_IMAGE / LLVM_REV)
          python3 -c "c=open('/tmp/talos-pkgs/Pkgfile').read();c=c.replace('vars:\n','vars:\n  LLVM_IMAGE: ghcr.io/siderolabs/llvm\n  LLVM_REV: v1.14.0-alpha.0\n\n',1);open('/tmp/talos-pkgs/Pkgfile','w').write(c);print('Pkgfile patched with LLVM_IMAGE / LLVM_REV')"

          # Patch config-arm64: use talos_signing_key.pem (make won't auto-regenerate it)
          sed -i 's|CONFIG_MODULE_SIG_KEY="certs/signing_key.pem"|CONFIG_MODULE_SIG_KEY="certs/talos_signing_key.pem"|g' \
            /tmp/talos-pkgs/kernel/build/config-arm64
          grep "CONFIG_MODULE_SIG_KEY" /tmp/talos-pkgs/kernel/build/config-arm64
          echo "✓ config-arm64 patched for reproducible signing key"

      - name: Build + push extensions to ghcr.io
        if: steps.check_cache.outputs.skip != 'true'
        run: make build-extensions
        timeout-minutes: 360
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}
          # BuildKit registry cache (mode=max): caches ALL intermediate layers
          # (kernel-build, llvm, base) across CI runs. On nvgpu-only changes the
          # kernel compile (~40 min) is a cache hit → build drops to ~15–20 min.
          CACHE_REGISTRY: ghcr.io/${{ github.repository_owner }}/build-cache

      - name: Build + push nvidia-firmware-ext to ghcr.io
        # Independent of the kernel build — only runs when the tag is not yet in ghcr.io.
        # Sources GA10B firmware from the NVIDIA L4T r36 (JetPack 6.2) apt repository.
        if: steps.check_cache.outputs.skip_fw != 'true'
        env:
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}
        run: |
          source scripts/common.sh
          echo "=== nvidia-firmware-ext:${FIRMWARE_EXT_TAG} build ==="

          # ── Download nvidia-l4t-firmware .deb from NVIDIA CDN ─────────────────
          # Parse the apt package index to find the exact .deb URL (no sudo needed).
          FW_TMP=$(mktemp -d)
          trap 'rm -rf "${FW_TMP}"' EXIT

          # nvidia-l4t-firmware can be in the 'common' or board-specific 't234' repo.
          # The distribution name is the full minor version (r36.5), not just r36.
          # Search both repos × common dist names and fall back to linux-firmware.
          DEB_FILE="${FW_TMP}/nvidia-l4t-firmware.deb"
          PKG_PATH=""
          BASE_URL=""

          for REPO in common t234; do
            for DIST in r36.5 r36.5.0 r36.4.3 r36; do
              INDEX_URL="https://repo.download.nvidia.com/jetson/${REPO}/dists/${DIST}/main/binary-arm64/Packages.gz"
              HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "${INDEX_URL}")
              echo "  ${REPO}/${DIST}: HTTP ${HTTP_CODE}"
              if [[ "${HTTP_CODE}" == "200" ]]; then
                # Download and inspect
                curl -fsSL --max-time 30 "${INDEX_URL}" 2>/dev/null \
                  | gunzip 2>/dev/null > "${FW_TMP}/Packages-${REPO}-${DIST}" || true
                # Debug: show available firmware packages
                echo "    firmware pkgs: $(grep '^Package:.*firmware' "${FW_TMP}/Packages-${REPO}-${DIST}" | head -5 || echo none)"
                if grep -q "^Package: nvidia-l4t-firmware$" "${FW_TMP}/Packages-${REPO}-${DIST}"; then
                  PKG_PATH=$(awk '/^Package: nvidia-l4t-firmware$/{found=1} found && /^Filename:/{print $2; exit}' \
                    "${FW_TMP}/Packages-${REPO}-${DIST}")
                  BASE_URL="https://repo.download.nvidia.com/jetson/${REPO}"
                  echo "  ✓ Found nvidia-l4t-firmware in ${REPO}/${DIST}: ${PKG_PATH}"
                  break 2
                fi
              fi
            done
          done

          if [[ -n "${PKG_PATH}" ]]; then
            curl -fsSL "${BASE_URL}/${PKG_PATH}" -o "${DEB_FILE}"
            echo "Downloaded from NVIDIA CDN: $(du -h ${DEB_FILE} | cut -f1)"
          else
            # Fallback: linux-firmware (upstream kernel.org tree includes GA10B files)
            # Files land at usr/lib/firmware/nvidia/ga10b/ — remap to ga10b/
            echo "⚠ NVIDIA CDN package not found — falling back to linux-firmware"
            (cd "${FW_TMP}" && apt-get download linux-firmware 2>&1 | tail -3)
            DEB_FILE=$(ls "${FW_TMP}"/linux-firmware_*.deb 2>/dev/null | head -1)
            [[ -f "${DEB_FILE}" ]] || { echo "ERROR: linux-firmware download failed"; exit 1; }
            echo "Downloaded linux-firmware: $(du -h ${DEB_FILE} | cut -f1)"
          fi

          # ── Extract firmware files ──────────────────────────────────────────────
          dpkg-deb --extract "${DEB_FILE}" "${FW_TMP}/pkg/"

          echo "Extracted package tree (all dirs):"
          find "${FW_TMP}/pkg" -type d | sort

          # Find ga10b/ directory at any depth — L4T may use /lib/firmware/ or
          # /usr/lib/firmware/, with or without a 'nvidia/' prefix.
          GA10B_SRC=$(find "${FW_TMP}/pkg" -type d -name "ga10b" | head -1)
          if [[ -z "${GA10B_SRC}" ]]; then
            echo "ERROR: no ga10b/ directory found in package"
            echo "All .bin files in package:"
            find "${FW_TMP}/pkg" -name "*.bin" | sort
            exit 1
          fi
          echo "GA10B firmware source: ${GA10B_SRC}"
          ls -la "${GA10B_SRC}/"

          # ── Build OCI extension ─────────────────────────────────────────────────
          EXT_DIR=$(mktemp -d)
          mkdir -p "${EXT_DIR}/rootfs/usr/lib/firmware"
          cp -r "${GA10B_SRC}" "${EXT_DIR}/rootfs/usr/lib/firmware/ga10b"

          # Use printf to avoid YAML-indentation contaminating the file contents
          printf 'version: v1alpha1\nmetadata:\n  name: nvidia-firmware-ext\n  version: %s\n  author: custom-build\n  description: NVIDIA GA10B firmware from JetPack r36.5 (pmu_pkc_prod_sig.bin + friends)\n  compatibility:\n    talos:\n      version: ">= 1.12.6"\n' \
            "${FIRMWARE_EXT_TAG}" > "${EXT_DIR}/manifest.yaml"

          printf 'FROM scratch\nCOPY manifest.yaml /manifest.yaml\nCOPY rootfs /rootfs\n' \
            > "${EXT_DIR}/Dockerfile"

          docker buildx build \
            --platform linux/arm64 \
            -t "${REGISTRY_DOCKER}/nvidia-firmware-ext:${FIRMWARE_EXT_TAG}" \
            --push \
            "${EXT_DIR}/"

          echo "✓ nvidia-firmware-ext:${FIRMWARE_EXT_TAG} pushed to ghcr.io"
