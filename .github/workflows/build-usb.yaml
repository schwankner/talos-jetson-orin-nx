name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version override (blank = use common.sh default)'
        required: false
        default: ''
      nvgpu_version:
        description: 'nvgpu extension version override (blank = use common.sh default)'
        required: false
        default: ''

concurrency:
  group: build-usb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build USB image
    # Native ARM64 runner — no QEMU overhead, 60 GB disk, 16 GB RAM
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          # Will be updated with the actual registry IP after it starts

      - name: Start local OCI registry
        run: |
          # Use port 5001 on all interfaces
          docker run -d --name registry --restart=always \
            -p 5001:5000 \
            registry:2

          # Wait up to 30 s for registry to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:5001/v2/_catalog && break
            echo "Waiting for registry… ($i/15)"
            sleep 2
          done

          # On Linux, Docker containers cannot reach the host via 'localhost' or
          # 'host.docker.internal' (unlike macOS). Use the host's primary LAN IP
          # so both build scripts (host) and BuildKit containers reach the same registry.
          HOST_IP=$(hostname -I | awk '{print $1}')
          echo "HOST_IP=${HOST_IP}" >> "$GITHUB_ENV"
          echo "REGISTRY=${HOST_IP}:5001"       >> "$GITHUB_ENV"
          echo "REGISTRY_DOCKER=${HOST_IP}:5001" >> "$GITHUB_ENV"
          echo "Registry reachable at ${HOST_IP}:5001"

      - name: Recreate Buildx builder with insecure registry config
        run: |
          # Now that we know HOST_IP, recreate the builder with the right config
          docker buildx rm talos-builder 2>/dev/null || true
          docker buildx create \
            --name talos-builder \
            --driver docker-container \
            --driver-opt network=host \
            --config <(cat <<EOF
          [registry."${HOST_IP}:5001"]
            http = true
            insecure = true
          EOF
          ) \
            --use
          docker buildx inspect --bootstrap talos-builder

      - name: Restore signing keys from GitHub Secrets
        run: |
          mkdir -p keys
          printf '%s' "${{ secrets.SIGNING_KEY_PEM }}"  > keys/signing_key.pem
          printf '%s' "${{ secrets.SIGNING_KEY_X509 }}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem
          # Quick sanity check
          openssl x509 -in keys/signing_key.x509 -noout -serial

      - name: Free up disk space
        run: |
          # Remove large pre-installed packages to free space for kernel build
          sudo apt-get remove -y --purge \
            '^dotnet-.*' '^llvm-.*' '^php.*' '^mongodb-.*' \
            azure-cli google-cloud-sdk google-chrome-stable firefox \
            2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Restore BuildKit cache
        uses: actions/cache@v4
        with:
          path: /tmp/buildkit-cache
          key: buildkit-nvgpu-${{ hashFiles('profiles/**', 'scripts/09-build-nvgpu.sh', 'scripts/common.sh') }}-${{ github.sha }}
          restore-keys: |
            buildkit-nvgpu-${{ hashFiles('profiles/**', 'scripts/09-build-nvgpu.sh', 'scripts/common.sh') }}-
            buildkit-nvgpu-

      - name: Build extensions (kernel + nvgpu + firmware)
        run: make build-extensions
        timeout-minutes: 120
        env:
          TALOS_VERSION: ${{ inputs.talos_version || '' }}
          NVGPU_VERSION: ${{ inputs.nvgpu_version || '' }}

      - name: Build UKI + USB image
        run: make usb
        timeout-minutes: 30

      - name: Locate produced image
        id: img
        run: |
          RAW=$(ls dist/*.raw dist/*.raw.zst 2>/dev/null | head -1)
          echo "path=${RAW}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${RAW})" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Upload USB image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-jetson-usb-${{ github.ref_name }}
          path: ${{ steps.img.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Talos Jetson Orin NX — ${{ github.ref_name }}"
          body: |
            ## USB boot image — ${{ github.ref_name }}

            Bootable USB image for the **Seeed Studio reComputer J4012** (Jetson Orin NX 16 GB).
            Likely compatible with all Jetson **Orin-series** modules (AGX Orin, Orin NX, Orin Nano).

            ### Flash

            ```bash
            # macOS
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/rdiskN bs=4m && sync

            # Linux
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/sdX bs=4M status=progress && sync
            ```

            ### Included extensions

            | Extension | Tag |
            |---|---|
            | `nvidia-tegra-nvgpu` | `${{ env.NVGPU_VERSION || '5.1.0' }}-6.18.18-talos` |
            | `nvidia-firmware-ext` | `v5` |
            | `kernel-modules-clang` | `1.1.0-6.18.18-talos` |

            See [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: ${{ steps.img.outputs.path }}
