name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-usb:
    name: Assemble UKI + USB image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - run: echo "Minimal test — if this passes, adding production steps next"
