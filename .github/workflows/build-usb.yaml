name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version (leave blank to use default from common.sh)'
        required: false
        default: ''
      nvgpu_version:
        description: 'nvgpu extension version (leave blank to use default)'
        required: false
        default: ''

concurrency:
  group: build-usb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build USB image
    runs-on: ubuntu-24.04-arm

    env:
      REGISTRY: localhost:5001
      REGISTRY_DOCKER: localhost:5001
      TALOS_VERSION: ${{ inputs.talos_version || '' }}
      NVGPU_VERSION: ${{ inputs.nvgpu_version || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."localhost:5001"]
              http = true
              insecure = true

      - name: Start local OCI registry
        run: |
          docker run -d --name registry --restart=always \
            -p 5001:5000 \
            registry:2
          # Wait for registry to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:5001/v2/_catalog && break
            sleep 2
          done

      - name: Restore signing keys from secrets
        run: |
          mkdir -p keys
          echo "${{ secrets.SIGNING_KEY_PEM }}" > keys/signing_key.pem
          echo "${{ secrets.SIGNING_KEY_X509 }}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem

      - name: Set version overrides
        run: |
          # If tag push, derive versions from tag (e.g. v1.12.6-nvgpu5.1.0)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Building from tag: ${TAG}"
          fi

      - name: Build extensions (kernel + nvgpu + firmware)
        run: |
          make build-extensions
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Build UKI + USB image
        run: |
          make usb
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Determine artifact name
        id: artifact
        run: |
          # Find the produced .raw file
          RAW=$(ls dist/*.raw 2>/dev/null | head -1)
          if [ -z "$RAW" ]; then
            RAW=$(ls dist/*.raw.zst 2>/dev/null | head -1)
          fi
          echo "raw_path=${RAW}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$(basename ${RAW})" >> "$GITHUB_OUTPUT"

      - name: Upload USB image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-jetson-usb-${{ github.ref_name }}
          path: ${{ steps.artifact.outputs.raw_path }}
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Talos Jetson Orin NX — ${{ github.ref_name }}"
          body: |
            ## Talos Linux USB Image — ${{ github.ref_name }}

            Bootable USB image for the **Seeed Studio reComputer J4012** (Jetson Orin NX 16 GB).

            ### Flash

            ```bash
            # macOS
            sudo dd if=${{ steps.artifact.outputs.artifact_name }} of=/dev/rdiskN bs=4m && sync

            # Linux
            sudo dd if=${{ steps.artifact.outputs.artifact_name }} of=/dev/sdX bs=4M status=progress && sync
            ```

            ### Included extensions

            - `nvidia-tegra-nvgpu` — GPU driver with `nvhost_podgov` devfreq governor (306–918 MHz)
            - `nvidia-firmware-ext:v5` — JetPack r36.5 firmware blobs
            - `kernel-modules-clang` — Clang-compiled kernel module tree

            See [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: ${{ steps.artifact.outputs.raw_path }}
          draft: false
          prerelease: false
