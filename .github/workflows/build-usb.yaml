name: Build USB Image

# Assembles a bootable USB image from extension images already in ghcr.io.
# Fast (~10 min). Runs on a standard x86_64 runner.
#
# Prerequisites: extension images must be in ghcr.io/<owner>/:
#   - nvidia-tegra-nvgpu:<nvgpu_version>-<kernel_version>-talos
#   - nvidia-firmware-ext:v5
#   - kernel-modules-clang:<version>-<kernel_version>-talos
#   - custom-installer:v<talos_version>-<kernel_version>
#
# Push extensions once via:
#   REGISTRY=ghcr.io/<owner> REGISTRY_DOCKER=ghcr.io/<owner> make build-extensions
# Or trigger the "Build Extensions (ARM64)" workflow if you have ARM64 runners.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version override (blank = common.sh default)'
        required: false
        default: ''
      nvgpu_version:
        description: 'nvgpu version override (blank = common.sh default)'
        required: false
        default: ''

concurrency:
  group: build-usb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-usb:
    name: Assemble UKI + USB image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (arm64 for Talos imager)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore signing keys
        run: |
          mkdir -p keys
          printf '%s' "${{ secrets.SIGNING_KEY_PEM }}"  > keys/signing_key.pem
          printf '%s' "${{ secrets.SIGNING_KEY_X509 }}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem

      - name: Build UKI + USB image
        run: make usb
        timeout-minutes: 30
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}
          TALOS_VERSION: ${{ inputs.talos_version || '' }}
          NVGPU_VERSION: ${{ inputs.nvgpu_version || '' }}

      - name: Locate produced image
        id: img
        run: |
          RAW=$(ls dist/*.raw dist/*.raw.zst 2>/dev/null | head -1)
          echo "path=${RAW}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${RAW}")" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Upload USB image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-jetson-usb-${{ github.ref_name }}
          path: ${{ steps.img.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Talos Jetson Orin NX — ${{ github.ref_name }}"
          body: |
            ## USB boot image — ${{ github.ref_name }}

            Bootable USB image for the **Seeed Studio reComputer J4012** (Jetson Orin NX 16 GB).
            Likely compatible with all Jetson **Orin-series** modules (AGX Orin, Orin NX, Orin Nano).

            ### Flash

            ```bash
            # macOS
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/rdiskN bs=4m && sync

            # Linux
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/sdX bs=4M status=progress && sync
            ```

            ### Included extensions

            | Extension | Tag |
            |---|---|
            | `nvidia-tegra-nvgpu` | `${{ env.NVGPU_VERSION || '5.1.0' }}-6.18.18-talos` |
            | `nvidia-firmware-ext` | `v5` |
            | `kernel-modules-clang` | `1.1.0-6.18.18-talos` |

            See [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: ${{ steps.img.outputs.path }}
