name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-usb:
    name: Assemble UKI + USB image
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - run: echo "test: minimal + permissions block only"
