name: CI

on:
  push:
    branches: [main, "release-*"]
    tags: ["v*"]
  pull_request:
    branches: [main, "release-*"]

jobs:
  # ── Shell script linting ────────────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        # Use apt instead of the action — avoids x86_64/arm64 download issues
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck --severity=warning scripts/*.sh
          echo "Shellcheck passed"

  # ── YAML validation ─────────────────────────────────────────────────────────
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate imager profiles
        run: |
          shopt -s nullglob
          files=(profiles/*.yaml)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No profile YAML files found — skipping"
            exit 0
          fi
          for f in "${files[@]}"; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate manifests
        run: |
          shopt -s globstar nullglob
          files=(manifests/**/*.yaml)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No manifest YAML files found — skipping"
            exit 0
          fi
          for f in "${files[@]}"; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done
