name: CI

on:
  push:
    branches: [main, "renovate/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Shell script linting ────────────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on committed build scripts
        run: |
          shellcheck --severity=warning \
            scripts/common.sh \
            scripts/setup-keys.sh \
            scripts/build-uki.sh \
            scripts/build-usb-image.sh \
            scripts/build-extensions.sh
          echo "Shellcheck passed"

  # ── YAML validation ─────────────────────────────────────────────────────────
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow YAML files
        run: |
          for f in .github/workflows/*.yaml .github/workflows/*.yml; do
            [[ -f "$f" ]] || continue
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate nvidia-tegra-nvgpu/pkg.yaml
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('nvidia-tegra-nvgpu/pkg.yaml'))" \
            && echo "OK: nvidia-tegra-nvgpu/pkg.yaml"
