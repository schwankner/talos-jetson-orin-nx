name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# workflow-level: must cover everything any job below needs
permissions:
  contents: write
  packages: write

jobs:
  # ── Job 1: Build kernel + GPU extensions (skips automatically if cached) ───
  build-extensions:
    name: Build extensions (skip if cached)
    uses: ./.github/workflows/build-extensions.yaml
    secrets: inherit
    permissions:
      contents: read
      packages: write

  # ── Job 2: Assemble UKI + USB image ────────────────────────────────────────
  build-usb:
    name: Assemble UKI + USB image
    needs: build-extensions
    runs-on: ubuntu-24.04-arm   # native arm64 — no QEMU needed

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore signing keys
        env:
          SIGNING_KEY_PEM: ${{ secrets.SIGNING_KEY_PEM }}
          SIGNING_KEY_X509: ${{ secrets.SIGNING_KEY_X509 }}
        run: |
          mkdir -p keys
          printf '%s' "${SIGNING_KEY_PEM}"  > keys/signing_key.pem
          printf '%s' "${SIGNING_KEY_X509}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem

      - name: Build UKI + USB image
        run: make usb
        timeout-minutes: 30
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}

      - name: Build versioned installer image for talosctl upgrade
        # Produces custom-installer:<talos>-<kernel>-nvgpu<nvgpu> — the full installer
        # with all extensions embedded. Required by `talosctl upgrade --image ...`.
        # The bare custom-installer:<talos>-<kernel> (no nvgpu suffix) built by
        # build-extensions.sh is only the base kernel; this step bakes the
        # extensions in via the Talos imager output.kind=installer.
        run: |
          source scripts/common.sh
          INSTALLER_TAG="ghcr.io/${{ github.repository_owner }}/custom-installer:${TALOS_VERSION}-${KERNEL_VERSION}-nvgpu${NVGPU_VERSION}"
          CUSTOM_IMAGER_TAG="custom-imager:${TALOS_VERSION}-llvm"
          INSTALLER_OUT="$(pwd)/dist/installer-out"
          mkdir -p "${INSTALLER_OUT}"

          # Same profile as build-uki.sh but output.kind=installer + outFormat=docker
          PROFILE=$(cat <<EOF
          arch: arm64
          platform: metal
          secureboot: false
          version: ${TALOS_VERSION}
          input:
            kernel:
              path: /usr/install/arm64/vmlinuz
            initramfs:
              path: /usr/install/arm64/initramfs.xz
            sdStub:
              path: /usr/install/arm64/systemd-stub.efi
            sdBoot:
              path: /usr/install/arm64/systemd-boot.efi
            baseInstaller:
              imageRef: ghcr.io/${{ github.repository_owner }}/custom-installer:${TALOS_VERSION}-${KERNEL_VERSION}
              forceInsecure: false
            systemExtensions:
              - imageRef: ghcr.io/${{ github.repository_owner }}/kernel-modules-clang:${KERNEL_MODULES_VERSION}-${KERNEL_VERSION}-talos
                forceInsecure: false
              - imageRef: ghcr.io/${{ github.repository_owner }}/nvidia-tegra-nvgpu:${NVGPU_VERSION}-${KERNEL_VERSION}-talos
                forceInsecure: false
              - imageRef: ghcr.io/${{ github.repository_owner }}/nvidia-firmware-ext:${FIRMWARE_EXT_TAG}
                forceInsecure: false
          customization:
            extraKernelArgs:
              - console=ttyTCU0,115200
              - firmware_class.path=/usr/lib/firmware
          output:
            kind: installer
            outFormat: raw
          EOF
          )

          echo "${PROFILE}" | docker run --rm -i \
            --platform linux/arm64 \
            --add-host host.docker.internal:host-gateway \
            -v "${INSTALLER_OUT}:/out" \
            -v "${HOME}/.docker/config.json:/root/.docker/config.json:ro" \
            "${CUSTOM_IMAGER_TAG}" \
            -

          echo "Installer imager output:"
          ls -lh "${INSTALLER_OUT}/"

          # Talos imager produces installer-arm64.tar (outFormat: raw keeps .tar extension)
          # The tar embeds the baseInstaller imageRef tag as the image name
          INSTALLER_TAR="${INSTALLER_OUT}/installer-arm64.tar"
          [[ -f "${INSTALLER_TAR}" ]] \
            || { echo "ERROR: installer-arm64.tar not found; files:"; ls "${INSTALLER_OUT}/"; exit 1; }

          docker load < "${INSTALLER_TAR}"

          # Imager embeds baseInstaller imageRef as the loaded tag:
          # ghcr.io/<owner>/custom-installer:<talos>-<kernel>  (base, no nvgpu suffix)
          LOADED_TAG="ghcr.io/${{ github.repository_owner }}/custom-installer:${TALOS_VERSION}-${KERNEL_VERSION}"
          if ! docker image inspect "${LOADED_TAG}" >/dev/null 2>&1; then
            # Fallback: search for any recently-loaded installer image
            LOADED_TAG=$(docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep "installer" | grep "${TALOS_VERSION}" | head -1)
            [[ -n "${LOADED_TAG}" ]] \
              || { echo "ERROR: could not find loaded installer image"; docker images; exit 1; }
          fi

          docker tag "${LOADED_TAG}" "${INSTALLER_TAG}"
          docker push "${INSTALLER_TAG}"
          echo "✓ Pushed: ${INSTALLER_TAG}"
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}

      - name: Locate produced image
        id: img
        run: |
          RAW=$(ls dist/*.raw dist/*.raw.zst 2>/dev/null | head -1)
          echo "path=${RAW}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${RAW}")" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Upload USB image as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: talos-jetson-usb-${{ github.ref_name }}
          path: ${{ steps.img.outputs.path }}
          retention-days: 30

      - name: Read versions for release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: ver
        run: |
          source scripts/common.sh
          echo "talos=${TALOS_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "kernel=${KERNEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "nvgpu=${NVGPU_VERSION}"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Talos Jetson Orin — ${{ github.ref_name }}"
          body: |
            ## USB boot image — ${{ github.ref_name }}

            **One image for the entire Jetson Orin family.**

            All Orin modules use the same T234 SoC with GA10B GPU and boot via UEFI (EDK2 in SPI
            flash). The DTB is loaded from the board's own SPI flash — no board-specific build
            needed. Flash this image to a USB stick and boot any Orin module.

            | Module | Status |
            |--------|--------|
            | Jetson Orin NX 16 GB (reComputer J4012) | ✅ Tested |
            | Jetson Orin NX 8 GB | ✅ Compatible (same SoC/GPU) |
            | Jetson Orin Nano 8 GB | ✅ Compatible (same SoC/GPU) |
            | Jetson Orin Nano 4 GB | ✅ Compatible (same SoC/GPU) |
            | Jetson AGX Orin (all SKUs) | ✅ Compatible (same SoC/GPU) |
            | Xavier / TX2 / Nano (classic) | ❌ Different GPU architecture |

            | Component | Version |
            |-----------|---------|
            | Talos Linux | `${{ steps.ver.outputs.talos }}` |
            | Linux kernel | `${{ steps.ver.outputs.kernel }}` |
            | nvidia-tegra-nvgpu | `${{ steps.ver.outputs.nvgpu }}` |

            ### Flash
            ```bash
            # macOS (replace N with disk number from: diskutil list)
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/rdiskN bs=4m && sync
            # Linux (replace X with your USB drive from: lsblk)
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/sdX bs=4M status=progress && sync
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: ${{ steps.img.outputs.path }}
