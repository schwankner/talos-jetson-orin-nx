name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# workflow-level: must cover everything any job below needs
permissions:
  contents: write
  packages: write

jobs:
  # ── Job 1: Build kernel + GPU extensions (skips automatically if cached) ───
  build-extensions:
    name: Build extensions (skip if cached)
    uses: ./.github/workflows/build-extensions.yaml
    secrets: inherit
    permissions:
      contents: read
      packages: write

  # ── Job 2: Assemble UKI + USB image ────────────────────────────────────────
  build-usb:
    name: Assemble UKI + USB image
    needs: build-extensions
    runs-on: ubuntu-24.04-arm   # native arm64 — no QEMU needed

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore signing keys
        env:
          SIGNING_KEY_PEM: ${{ secrets.SIGNING_KEY_PEM }}
          SIGNING_KEY_X509: ${{ secrets.SIGNING_KEY_X509 }}
        run: |
          mkdir -p keys
          printf '%s' "${SIGNING_KEY_PEM}"  > keys/signing_key.pem
          printf '%s' "${SIGNING_KEY_X509}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem

      - name: Build UKI + USB image
        run: make usb
        timeout-minutes: 30
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}

      - name: Locate produced image
        id: img
        run: |
          RAW=$(ls dist/*.raw dist/*.raw.zst 2>/dev/null | head -1)
          echo "path=${RAW}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${RAW}")" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Upload USB image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-jetson-usb-${{ github.ref_name }}
          path: ${{ steps.img.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Talos Jetson Orin NX — ${{ github.ref_name }}"
          body: |
            ## USB boot image — ${{ github.ref_name }}

            Bootable for Seeed Studio reComputer J4012 (Jetson Orin NX 16 GB).
            Compatible with all Jetson Orin-series modules.

            ### Flash
            ```bash
            # macOS
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/rdiskN bs=4m && sync
            # Linux
            sudo dd if=${{ steps.img.outputs.name }} of=/dev/sdX bs=4M status=progress && sync
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for instructions.
          files: ${{ steps.img.outputs.path }}
