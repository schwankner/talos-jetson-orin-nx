name: Build USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-usb:
    name: Assemble UKI + USB image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3

      - name: Restore signing keys
        env:
          SIGNING_KEY_PEM: ${{ secrets.SIGNING_KEY_PEM }}
          SIGNING_KEY_X509: ${{ secrets.SIGNING_KEY_X509 }}
        run: |
          mkdir -p keys
          printf '%s' "${SIGNING_KEY_PEM}"  > keys/signing_key.pem
          printf '%s' "${SIGNING_KEY_X509}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem
          echo "keys restored"
