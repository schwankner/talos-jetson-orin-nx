name: USB Build

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version override (blank = use common.sh default)'
        required: false
      nvgpu_version:
        description: 'nvgpu version override (blank = use common.sh default)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - name: restore keys
        run: |
          mkdir -p keys
          printf '%s' "${{ secrets.SIGNING_KEY_PEM }}" > keys/signing_key.pem
          printf '%s' "${{ secrets.SIGNING_KEY_X509 }}" > keys/signing_key.x509
      - run: echo "Success! talos=${{ inputs.talos_version }}"
