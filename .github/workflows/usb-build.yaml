name: USB Build

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      talos_version:
        description: Talos version override
        required: false
        default: ""
      nvgpu_version:
        description: nvgpu version override
        required: false
        default: ""

jobs:
  build-usb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - name: Restore signing keys
        run: |
          mkdir -p keys
          printf "%s" "${{ secrets.SIGNING_KEY_PEM }}"  > keys/signing_key.pem
          printf "%s" "${{ secrets.SIGNING_KEY_X509 }}" > keys/signing_key.x509
          chmod 600 keys/signing_key.pem
      - name: Build UKI + USB image
        run: make usb
        timeout-minutes: 30
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          REGISTRY_DOCKER: ghcr.io/${{ github.repository_owner }}
      - uses: actions/upload-artifact@v4
        with:
          name: talos-jetson-usb
          path: dist/
          retention-days: 30
