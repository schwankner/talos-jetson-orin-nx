---
# nvidia-device-plugin — exposes nvidia.com/gpu as a Kubernetes extended resource
#
# Uses squat/generic-device-plugin (https://github.com/squat/generic-device-plugin)
# which watches /dev/nvgpu/igpu0/ctrl and reports nvidia.com/gpu: 1 to kubelet.
#
# Device injection strategy (two-layer):
#   1. Device plugin injects /dev/nvgpu/igpu0/ctrl (sentinel device, resource tracking)
#   2. containerd CDI annotation (cdi.k8s.io/ on the pod) injects the full set of
#      nvgpu + nvhost device nodes, JetPack r36.5 libs and LD_LIBRARY_PATH from
#      /var/run/cdi/nvidia-jetson.yaml (written by nvidia-cdi-setup DaemonSet)
#
# Resource exposed:  nvidia.com/gpu
#
# Prerequisites:
#   - nvidia-cdi-setup DaemonSet Running (CDI spec present at /var/run/cdi/)
#   - containerd 2.x (CDI enabled by default in containerd 2.x)
#
# Apply:
#   kubectl apply -f manifests/gpu/device-plugin.yaml
#   (called automatically by scripts/10-setup-cdi.sh)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-system
  labels:
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: generic-device-plugin
          # squat/generic-device-plugin — multi-arch (amd64 + arm64)
          # Source: https://github.com/squat/generic-device-plugin
          # Using --device flag directly (config file approach has a mount quirk).
          # Digest-pin in production for reproducibility:
          #   squat/generic-device-plugin@sha256:e85f9637ea93f0e9a8d477b0e136783cd6fb8f1a5426cf84ef05ab4c88661c8c
          image: squat/generic-device-plugin:latest
          args:
            # Expose resources under the nvidia.com domain → nvidia.com/gpu: 1
            - --domain=nvidia.com
            # Sentinel device: GPU presence is determined by /dev/nvgpu/igpu0/ctrl.
            # mountPath must match path for the AllocateResponse device entry.
            # Full CDI injection (all devices + libs + env) is handled separately
            # via the cdi.k8s.io/gpu0 pod annotation in ollama-cdi.yaml.
            - --device={"name":"gpu","groups":[{"count":1,"paths":[{"path":"/dev/nvgpu/igpu0/ctrl","mountPath":"/dev/nvgpu/igpu0/ctrl"}]}]}
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
