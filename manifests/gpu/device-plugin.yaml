---
# nvidia-device-plugin — exposes nvidia.com/gpu as a Kubernetes extended resource
#
# Uses squat/generic-device-plugin (https://github.com/squat/generic-device-plugin)
# running in CDI mode: on AllocateResponse it returns the CDI device ID
# "nvidia.com/gpu=0" rather than raw device paths.  containerd 2.x reads the
# CDI spec written by the nvidia-cdi-setup DaemonSet and injects all devices,
# mounts and environment variables automatically.
#
# Resource exposed:  nvidia.com/gpu
# CDI device ID:     nvidia.com/gpu=0   (matches kind/name in the CDI spec)
#
# Prerequisites:
#   - nvidia-cdi-setup DaemonSet must be Running (CDI spec present)
#   - containerd CDI enabled (see manifests/talos/machine-patch-cdi.yaml)
#
# Apply:
#   kubectl apply -f manifests/gpu/device-plugin.yaml
#   (applied automatically by scripts/10-setup-cdi.sh)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-config
  namespace: nvidia-system
data:
  # Device group config for squat/generic-device-plugin.
  #
  # The plugin watches /dev/nvgpu/igpu0/ctrl to determine GPU presence.
  # When a pod requests nvidia.com/gpu, it returns the CDI device ID
  # "nvidia.com/gpu=0" in AllocateResponse — containerd resolves the rest
  # from the CDI spec at /var/run/cdi/nvidia-jetson.yaml.
  #
  # count: 1 — single Jetson iGPU; concurrent GPU access is handled at the
  #            CUDA / nvgpu level, not at this allocation level.
  config.yaml: |
    - name: gpu
      groups:
        - count: 1
          paths:
            - path: /dev/nvgpu/igpu0/ctrl
          cdi:
            - kind: nvidia.com/gpu
              name: "0"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-system
  labels:
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: generic-device-plugin
          # squat/generic-device-plugin v0.5.0 — multi-arch (amd64 + arm64)
          # Source: https://github.com/squat/generic-device-plugin
          # Pin to a specific digest in production for reproducibility.
          image: squat/generic-device-plugin:0.5.0
          args:
            # Expose resources under the nvidia.com domain → nvidia.com/gpu
            - --domain=nvidia.com
            - --config=/etc/config/config.yaml
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
            - name: config
              mountPath: /etc/config
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
        - name: config
          configMap:
            name: nvidia-device-plugin-config
