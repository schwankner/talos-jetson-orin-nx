---
# Ollama deployment — CDI-based GPU access (OOB, no manual lib mounts required)
#
# This manifest relies on the Container Device Interface stack set up by:
#
#   manifests/gpu/cdi-setup.yaml      — writes /var/run/cdi/nvidia-jetson.yaml
#   manifests/gpu/device-plugin.yaml  — exposes nvidia.com/gpu resource
#   manifests/talos/machine-patch-cdi.yaml — enables CDI in containerd
#
# How it works:
#   1. Pod requests resources.limits.nvidia.com/gpu: "1"
#   2. nvidia-device-plugin AllocateResponse returns CDI device ID "nvidia.com/gpu=0"
#   3. containerd reads /var/run/cdi/nvidia-jetson.yaml and automatically injects:
#        • All nvgpu + nvhost device nodes
#        • /var/lib/nvidia-tegra-libs/tegra → /usr/lib/aarch64-linux-gnu/nvidia (bind)
#        • LD_LIBRARY_PATH pointing at the JetPack r36.5 libs
#   4. Ollama starts — CUDA init finds real libs and GPU devices; no extra steps needed
#
# CDI advantages over traditional hostPath approaches:
#   ✓  No initContainer needed (firmware + symlink handled by nvidia-cdi-setup DaemonSet)
#   ✓  No hostPath volume for /dev
#   ✓  No hostPath volume for JetPack libs
#   ✓  No manually set LD_LIBRARY_PATH
#   ✓  No securityContext.privileged (verified 2026-04-10: GPU works without it)
---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama
  labels:
    # Required so containerd's pod-security webhook allows the privileged securityContext
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
---
# Persistent storage for Ollama models on NVMe EPHEMERAL partition
# /var is mounted from /dev/nvme0n1p4 (125 GB available)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-models-pv
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /var/lib/ollama-models
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ollama
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 80Gi
  volumeName: ollama-models-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
      annotations:
        # CDI pod annotation — tells containerd 2.x to inject the CDI device "nvidia.com/gpu=0"
        # from the spec at /var/run/cdi/nvidia-jetson.yaml.  This injects all nvgpu + nvhost
        # device nodes, the JetPack r36.5 library bind-mount, and LD_LIBRARY_PATH automatically.
        # The device plugin (nvidia.com/gpu resource) handles Kubernetes scheduling;
        # this annotation handles the actual containerd-level device + lib injection.
        cdi.k8s.io/gpu0: "nvidia.com/gpu=0"
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: ollama
          # ollama/ollama:0.20.5 + JETSON_JETPACK=6 activates cuda_jetpack6/libggml-cuda.so
          # (GA10B compute 8.7, tuned for Orin NX).  dustynv/ollama is obsolete.
          image: ollama/ollama:0.20.5
          imagePullPolicy: IfNotPresent
          command: ["ollama", "serve"]
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: "/models"
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            # Single parallel request — avoids wasted KV cache slots for idle sequences
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            # Activates cuda_jetpack6/libggml-cuda.so backend for GA10B (Orin NX).
            # Without this, Ollama silently falls back to CPU-only mode.
            - name: JETSON_JETPACK
              value: "6"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            # KV cache quantization — halves KV cache memory bandwidth at negligible quality cost.
            # q8_0: 8-bit KV cache (recommended default — good quality/speed tradeoff)
            # q4_0: 4-bit KV cache (more aggressive, noticeable on long contexts)
            # Helps especially for 7b+ models with long contexts where KV cache
            # competes with weight memory bandwidth.
            - name: OLLAMA_KV_CACHE_TYPE
              value: "q8_0"
            # Go GC tuning — reduce GC frequency during inference.
            # Default GOGC=100 triggers GC at every 2× heap growth; at 400 GC runs
            # only at 5× heap growth. Reduces GC pauses between token generations,
            # most noticeable for small models (0.5b) where CPU↔GPU round-trips are
            # the bottleneck rather than memory bandwidth.
            - name: GOGC
              value: "400"
            # LD_LIBRARY_PATH is injected automatically by the CDI spec.
            # No manual env override needed.
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 14Gi
              # ← CDI triggers here: device plugin returns "nvidia.com/gpu=0",
              #   containerd injects all devices + lib mount + LD_LIBRARY_PATH.
              nvidia.com/gpu: "1"
          # ✅ No privileged: true required — CDI injects GPU devices + libs automatically.
          # Verified 2026-04-10: qwen2.5:0.5b ran at ~50 tok/s without privileged.
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ollama
spec:
  type: NodePort
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      nodePort: 31434
