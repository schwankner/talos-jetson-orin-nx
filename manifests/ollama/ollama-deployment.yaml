---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama
---
# Persistent storage for Ollama models on NVMe EPHEMERAL partition
# /var is mounted from /dev/nvme0n1p4 (125 GB available)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-models-pv
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /var/lib/ollama-models
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ollama
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 80Gi
  volumeName: ollama-models-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      tolerations:
        - operator: Exists
      hostPID: false
      # initContainer creates the device nodes / symlinks that libcuda.so.1.1 needs
      # but that nvgpu 5.0.0 (NVHOST=n) doesn't create automatically.
      # /dev/nvhost-ctrl is the global nvhost control device that JetPack libcuda.so
      # checks during cuInit. With NVHOST=n it doesn't exist, so we create a symlink
      # to /dev/nvgpu/igpu0/ctrl (the new JetPack 6 device path).
      initContainers:
        - name: setup-gpu-devices
          image: busybox:latest
          securityContext:
            privileged: true
          command:
          - sh
          - -c
          - |
            set -x
            # ── Step 1: Firmware path fix ────────────────────────────────────────
            # The rootfs bind mount at /usr/lib/firmware has i_writecount > 0
            # on the PMU firmware inode, causing request_firmware() to return
            # -ETXTBSY (-26).  Workaround: copy firmware to NVMe (XFS) and
            # redirect firmware_class.path to that fresh copy.
            FW_DEST=/host-var/fw-fresh
            if [ ! -f "${FW_DEST}/ga10b/gpmu_ucode_next_prod_image.bin" ]; then
              echo "Copying firmware to NVMe ${FW_DEST}..."
              mkdir -p "${FW_DEST}/ga10b"
              cp /host-fw-src/ga10b/* "${FW_DEST}/ga10b/" 2>&1 || true
              # Also copy display firmware if present
              [ -f /host-fw-src/display-t234-dce.bin ] && \
                cp /host-fw-src/display-t234-dce.bin "${FW_DEST}/" 2>/dev/null || true
            fi
            echo "Redirecting firmware_class.path -> /var/fw-fresh"
            echo -n '/var/fw-fresh' > /sys/module/firmware_class/parameters/path
            echo "firmware_class.path: $(cat /sys/module/firmware_class/parameters/path)"

            # ── Step 2: GPU device symlink ───────────────────────────────────────
            # Create /dev/nvhost-ctrl as symlink to /dev/nvgpu/igpu0/ctrl
            # libcuda.so.1.1 (JetPack 6) opens this during cuInit hardware check
            if [ ! -e /dev/nvhost-ctrl ]; then
              ln -sf /dev/nvgpu/igpu0/ctrl /dev/nvhost-ctrl
              echo "Created /dev/nvhost-ctrl -> /dev/nvgpu/igpu0/ctrl"
            fi
            # Ensure permissions on nvgpu devices are open
            chmod 666 /dev/nvgpu/igpu0/ctrl 2>/dev/null || true
            chmod 666 /dev/nvgpu/igpu0/channel 2>/dev/null || true
            chmod 666 /dev/nvmap 2>/dev/null || true
            chmod 666 /dev/nvhost-power-gpu 2>/dev/null || true
            ls -la /dev/nvhost-ctrl /dev/nvgpu/igpu0/ /dev/nvmap 2>&1
            echo "GPU device setup complete"
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: host-firmware
              mountPath: /host-fw-src
              readOnly: true
            - name: host-var
              mountPath: /host-var
      containers:
        - name: ollama
          image: dustynv/ollama:r36.4.0
          imagePullPolicy: IfNotPresent
          command: ["ollama", "serve"]
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: "/models"
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            - name: LD_LIBRARY_PATH
              # Prepend r36.5 userspace libs so libcuda.so.1 (r36.5) takes precedence
              # over the r36.4.3 version embedded in /usr/local/cuda/compat/.
              # The container's r36.4.3 libcuda conflicts with the r36.5 kernel firmware
              # and r36.5 libnvrm_* libs we mount at /usr/lib/aarch64-linux-gnu/nvidia/.
              value: "/usr/lib/aarch64-linux-gnu/nvidia:/usr/local/cuda/lib:/usr/local/cuda/lib64:/usr/local/cuda/include:/usr/local/cuda/compat:/usr/local/cuda/lib64"
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 14Gi
          securityContext:
            privileged: true        # Required for GPU device access on Talos
          volumeMounts:
            - name: models
              mountPath: /models
            - name: dev
              mountPath: /dev
            - name: nvidia-tegra-libs
              mountPath: /usr/lib/aarch64-linux-gnu/nvidia
              # Mounts real JetPack r36.5 GPU libs over the 0-byte stubs in the dustynv container.
              # Required because Talos has no JetPack userspace stack on the host.
              # Libs downloaded via install-l4t-libs job from NVIDIA APT repo.
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
        - name: dev
          hostPath:
            path: /dev              # Exposes all nvhost-* GPU devices to the container
        - name: nvidia-tegra-libs
          hostPath:
            path: /var/lib/nvidia-tegra-libs/tegra  # Real JetPack libs: libnvrm_gpu.so, libcuda.so etc.
        - name: host-firmware
          hostPath:
            path: /usr/lib/firmware  # Source: extension firmware on rootfs (read-only)
        - name: host-var
          hostPath:
            path: /var  # NVMe XFS partition — used for fw-fresh copy with clean inodes
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ollama
spec:
  type: NodePort
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      nodePort: 31434
