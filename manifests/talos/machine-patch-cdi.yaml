# Talos machine config patch — node labels for Jetson GPU node
#
# Talos 1.13+: CDI is enabled by default in containerd (enable_cdi = true,
# cdi_spec_dirs = ["/run/cdi"]).  No containerd.toml override is needed anymore.
# This patch only sets node labels so that workloads can target the Jetson GPU node.
#
# Apply (once; no reboot required — labels take effect immediately):
#   talosctl apply-config \
#     --nodes <jetson-ip> \
#     --patch @manifests/talos/machine-patch-cdi.yaml \
#     --mode no-reboot
#
# (called automatically by scripts/03-apply-config.sh)
#
# Historical note (Talos <= 1.12):
#   On Talos 1.12 and earlier, CDI was not enabled by default and required
#   overwriting /etc/cri/containerd.toml with enable_cdi = true and
#   cdi_spec_dirs = ["/var/run/cdi"].  That workaround is no longer needed
#   on 1.13+.  See git history for the old file contents.
machine:
  nodeLabels:
    # Identifies this node as a Jetson Orin GPU node (iGPU / Tegra SoC).
    # Use this label in nodeSelector / nodeAffinity to target Jetson workloads.
    # Deliberately NOT using nvidia.com/* namespace — that is reserved for nodes
    # with discrete PCIe GPUs managed by the NVIDIA GPU Operator / NFD.
    accelerator: jetson-orin
    # Redundant with kubernetes.io/arch=arm64 but explicit for GPU workloads
    # that need to know they're on an ARM iGPU node.
    nvidia.com/gpu.type: igpu
